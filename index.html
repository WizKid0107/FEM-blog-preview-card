<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

<body>
<main>
  
      <article>
  
        <img src="./assets/images/illustration-article.svg" alt="" class="blog-img">
  
          <div class="content-wrapper">
  
            <span class="category">Learning</span>
  
            <p class="publish-date">Published <time datetime="2023-12-21">21 Dec 2023</time></p>
  
            <a href="#">
              <h1>HTML & CSS foundations</h1>
            </a>
  
            <p class="description ">These languages are the backbone of every website, defining structure, content, and presentation.</p>
  
          </div>
  
  
        <footer>
  
          <img src="./assets/images/image-avatar.webp" alt="Author avatar" class="author-img">
  
          <span>Greg Hooper</span>
  
        </footer>
      </article>
</main>
