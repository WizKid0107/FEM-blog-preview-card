<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

  <link rel="preconnect" href="https://fonts.googleapis.com"> <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500,800&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Blog preview card</title>
  
</head>
<body>

    <article>

      <img src="./assets/images/illustration-article.svg" alt="" class="blog-img">

        <div class="content-wrapper">
  
          <span class="category">Learning</span>
    
          <p class="publish-date">Published <time datetime="2023-12-21">21 Dec 2023</time></p>
    
          <h2 tabindex="0">HTML & CSS foundations</h2>
    
          <p class="description ">These languages are the backbone of every website, defining structure, content, and presentation.</p>

        </div>
      

      <footer>
  
        <img src="./assets/images/image-avatar.webp" alt="Author avatar" class="author-img">
  
        <span>Greg Hooper</span>
  
      </footer>
    </article>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/WizKid0107" target="_blank">Anthony</a>.
  </div>
</body>
</html>
